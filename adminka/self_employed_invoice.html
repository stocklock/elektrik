<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Счёт для самозанятых</title>
</head>
<body>
  <h2>Выставление счёта через "Мой налог"</h2>
  <form id="invoiceForm">
    <label>ИНН (12 цифр): <input type="text" name="inn" required /></label><br>
    <label>Телефон (+79...): <input type="text" name="phone" required /></label><br>
    <label>Услуга / Товар: <input type="text" name="service_name" required /></label><br>
    <label>Сумма (₽): <input type="number" name="price" required /></label><br>
    <button type="submit">Выставить счёт</button>
  </form>
  <pre id="result"></pre>

  <script>
    document.getElementById('invoiceForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const formData = new FormData(this);
      const result = document.getElementById('result');
      result.textContent = "Отправка...";
      const response = await fetch('ajax/send_invoice.php', {
        method: 'POST',
        body: formData
      });
      const json = await response.json();
      result.textContent = JSON.stringify(json, null, 2);
    });
  </script>
</body>
</html>
